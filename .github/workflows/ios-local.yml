name: ios-local-build
on:
  workflow_dispatch:

defaults:
  run:
    working-directory: project-mobile

jobs:
  build:
    runs-on: macos-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}   # auth for all eas commands
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install EAS CLI
        run: npm i -g eas-cli

      - name: Install deps
        run: npm ci

      - name: Verify Expo auth
        run: eas whoami

      - name: EAS local build (iOS)
        run: eas build --platform ios --profile preview --local --non-interactive --output build.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: project-mobile/build.ipa

      # ✅ New step: write .p8 key from secret into a file
      - name: Write ASC API key to file
        working-directory: project-mobile
        run: |
          cat > asc.p8 <<'EOF'
          ${{ secrets.ASC_API_KEY_P8 }}
          EOF
          chmod 600 asc.p8

      - name: Submit to TestFlight
        working-directory: project-mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

          # App Store Connect API key (what `eas submit` expects)
          EXPO_ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          EXPO_ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          EXPO_ASC_API_KEY_PATH: ${{ github.workspace }}/project-mobile/asc.p8

          # Optional if you belong to multiple Apple teams
          EXPO_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

        run: |
          eas submit --platform ios \
            --path build.ipa \
            --non-interactive \
            --verbose
