name: ios-local-build
on:
  workflow_dispatch:

# Run all shell steps from your app folder
defaults:
  run:
    working-directory: project-mobile

jobs:
  build:
    runs-on: macos-latest
    env:
      # Expo auth for all EAS commands (create on expo.dev → Account → Access Tokens)
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: project-mobile/package-lock.json

      - name: Install EAS CLI
        run: npm i -g eas-cli

      - name: Install deps
        run: npm ci

      - name: Verify Expo auth
        run: eas whoami

      # Make Apple API key available to EAS (for managed credentials)
      - name: Set Apple API key env for EAS
        shell: bash
        run: |
          echo "EXPO_APP_STORE_CONNECT_ISSUER_ID=${{ secrets.ASC_ISSUER_ID }}" >> $GITHUB_ENV
          echo "EXPO_APP_STORE_CONNECT_KEY_ID=${{ secrets.ASC_KEY_ID }}" >> $GITHUB_ENV
          {
            echo "EXPO_APP_STORE_CONNECT_PRIVATE_KEY<<'EOF'"
            echo "${{ secrets.ASC_API_KEY_P8_BASE64 }}" | base64 --decode
            echo "EOF"
          } >> $GITHUB_ENV

      - name: Ensure iOS credentials (managed)
        run: eas credentials -p ios --non-interactive --force

      - name: EAS local build (iOS)
        run: eas build --platform ios --profile preview --local --non-interactive --output build.ipa --verbose

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: project-mobile/build.ipa

      # Recreate the .p8 file from the secret just for submission
      - name: Write ASC API key to file
        shell: bash
        run: |
          echo "${{ secrets.ASC_API_KEY_P8_BASE64 }}" | base64 --decode > asc.p8

      - name: Submit to TestFlight
        run: |
          eas submit -p ios \
            --path build.ipa \
            --asc-app-id "${{ secrets.ASC_APP_ID }}" \
            --issuer-id "${{ secrets.ASC_ISSUER_ID }}" \
            --key-id "${{ secrets.ASC_KEY_ID }}" \
            --asc-api-key-path asc.p8 \
            --apple-team-id "${{ secrets.APPLE_TEAM_ID }}" \
            --non-interactive --verbose
