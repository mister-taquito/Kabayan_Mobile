name: ios-local-build
on: { workflow_dispatch: {} }

defaults:
  run:
    working-directory: project-mobile

jobs:
  build:
    runs-on: macos-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install EAS CLI
        run: npm i -g eas-cli

      - name: Install deps
        run: npm ci

      - name: Verify Expo auth
        run: eas whoami

      - name: EAS local build (iOS)
        run: eas build --platform ios --profile preview --local --non-interactive --output build.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: project-mobile/build.ipa

      # --- App Store Connect API key setup ---
      - name: Write ASC API key to file
        run: echo "${{ secrets.ASC_API_KEY_P8_BASE64 }}" | base64 --decode > asc.p8

      - name: Quick sanity check (no secrets printed)
        run: |
          echo "ASC_KEY_ID length: ${#ASC_KEY_ID}"
          echo "ASC_ISSUER_ID length: ${#ASC_ISSUER_ID}"
          test -f asc.p8 && echo "asc.p8 exists" || (echo "asc.p8 missing"; exit 1)
          wc -c asc.p8
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}

      - name: Submit to TestFlight
        working-directory: project-mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          EXPO_ASC_API_KEY_PATH: ${{ github.workspace }}/project-mobile/asc.p8
          ASC_APP_ID: ${{ secrets.ASC_APP_ID }} # only if you kept env:ASC_APP_ID in eas.json
        run: |
          # Shows what EAS resolved (secrets masked) – super helpful
          eas config --platform ios --profile preview
          eas submit --platform ios --path build.ipa --profile preview --non-interactive --verbose

