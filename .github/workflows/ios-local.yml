name: ios-local-build
on: { workflow_dispatch: {} }

defaults:
  run:
    working-directory: project-mobile

jobs:
  build:
    runs-on: macos-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install EAS CLI
        run: npm i -g eas-cli

      - name: Install deps
        run: npm ci

      - name: Verify Expo auth
        run: eas whoami

      - name: EAS local build (iOS)
        run: eas build --platform ios --profile preview --local --non-interactive --output build.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: project-mobile/build.ipa

      # --- App Store Connect API key setup ---
      - name: Write ASC API key to file
        # runner shell is bash; this correctly decodes to asc.p8
        run: echo "${{ secrets.ASC_API_KEY_BASE64 }}" | base64 --decode > asc.p8

      - name: Quick format sanity check (does not print secrets)
        shell: bash
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          echo "KeyId length: ${#ASC_KEY_ID}"
          echo "IssuerId length: ${#ASC_ISSUER_ID}"
          test -f asc.p8 && echo "asc.p8 exists" || (echo "asc.p8 missing"; exit 1)

      - name: Submit to TestFlight
        working-directory: project-mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          EXPO_ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          EXPO_ASC_API_KEY_PATH: ${{ github.workspace }}/project-mobile/asc.p8
          EXPO_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}   # optional
          APPSTORE_APP_ID: ${{ secrets.APPSTORE_APP_ID }}    # <-- the numeric Apple ID
        run: |
          eas submit --platform ios \
            --path build.ipa \
            --asc-app-id $APPSTORE_APP_ID \
            --non-interactive --verbose

