name: ios-local-build
on: { workflow_dispatch: {} }

defaults:
  run:
    working-directory: project-mobile

jobs:
  build:
    runs-on: macos-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install EAS CLI
        run: npm i -g eas-cli

      - name: Install deps
        run: npm ci

      - name: Verify Expo auth
        run: eas whoami

      - name: EAS local build (iOS)
        run: eas build --platform ios --profile preview --local --non-interactive --output build.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: project-mobile/build.ipa

      # --- App Store Connect API key setup ---
      - name: Write ASC API key to file
        run: echo "${{ secrets.ASC_API_KEY_P8_BASE64 }}" | base64 --decode > asc.p8

      - name: Quick sanity check (no secrets printed)
        run: |
          echo "ASC_KEY_ID length: ${#ASC_KEY_ID}"
          echo "ASC_ISSUER_ID length: ${#ASC_ISSUER_ID}"
          test -f asc.p8 && echo "asc.p8 exists" || (echo "asc.p8 missing"; exit 1)
          wc -c asc.p8
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}

      - name: Submit to TestFlight (explicit flags)
        working-directory: project-mobile
        env:
          EXPO_TOKEN:       ${{ secrets.EXPO_TOKEN }}

          # From your Secrets page (exact names below)
          ASC_KEY_ID:       ${{ secrets.ASC_KEY_ID }}         # e.g. J66XXCZ7UG  (10 chars)
          ASC_ISSUER_ID:    ${{ secrets.ASC_ISSUER_ID }}      # e.g. f8d047c6-f1d2-431c-b772-68be376f837b
          ASC_APP_ID:       ${{ secrets.ASC_APP_ID }}         # e.g. 6751611425  (digits only)
          APPLE_TEAM_ID:    ${{ secrets.APPLE_TEAM_ID }}      # 10 chars (Team ID)

        run: |
          # Make sure we have the latest CLI and no surprises
          npm i -g eas-cli@latest

          # Build the absolute path to the p8 we wrote earlier
          ASC_P8="${GITHUB_WORKSPACE}/project-mobile/asc.p8"

          # Hard-trim any stray whitespace/newlines that may be in GitHub secrets
          trim () { printf "%s" "$1" | tr -d '\r\n\t ' ; }
          ASC_KEY_ID="$(trim "$ASC_KEY_ID")"
          ASC_ISSUER_ID="$(trim "$ASC_ISSUER_ID")"
          ASC_APP_ID="$(trim "$ASC_APP_ID")"
          APPLE_TEAM_ID="$(trim "$APPLE_TEAM_ID")"

          # Quick client-side format checks (fail fast with a helpful message)
          [[ "$ASC_KEY_ID" =~ ^[A-Z0-9]{10}$ ]] || { echo "ASC_KEY_ID format bad"; exit 1; }
          [[ "$ASC_ISSUER_ID" =~ ^[0-9a-f-]{36}$ ]] || { echo "ASC_ISSUER_ID format bad"; exit 1; }
          [[ "$ASC_APP_ID" =~ ^[0-9]+$ ]] || { echo "ASC_APP_ID format bad"; exit 1; }
          [[ "$APPLE_TEAM_ID" =~ ^[A-Z0-9]{10}$ ]] || { echo "APPLE_TEAM_ID format bad"; exit 1; }
          test -f "$ASC_P8" || { echo "asc.p8 not found at $ASC_P8"; exit 1; }

          # Submit with explicit flags (bypass eas.json submit mapping entirely)
          eas submit -p ios \
            --path build.ipa \
            --asc-app-id "$ASC_APP_ID" \
            --asc-api-key-id "$ASC_KEY_ID" \
            --asc-api-key-issuer-id "$ASC_ISSUER_ID" \
            --asc-api-key-path "$ASC_P8" \
            --apple-team-id "$APPLE_TEAM_ID" \
            --non-interactive --verbose


