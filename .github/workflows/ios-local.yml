name: ios-local-build
on: { workflow_dispatch: {} }

defaults:
  run:
    working-directory: project-mobile

jobs:
  build:
    runs-on: macos-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install EAS CLI
        run: npm i -g eas-cli

      - name: Install deps
        run: npm ci

      - name: Verify Expo auth
        run: eas whoami

      - name: EAS local build (iOS)
        run: eas build --platform ios --profile preview --local --non-interactive --output build.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: project-mobile/build.ipa

      # --- App Store Connect API key setup ---
      - name: Write ASC API key to file
        # macOS uses -D to decode; GNU uses -d. Try both.
        run: |
          ( echo "${{ secrets.ASC_API_KEY_BASE64 }}" | base64 -d > asc.p8 ) || \
          ( echo "${{ secrets.ASC_API_KEY_BASE64 }}" | base64 -D > asc.p8 )

      - name: Quick format sanity check (does not print secrets)
        shell: bash
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          test -f asc.p8 && echo "asc.p8 exists, size: $(wc -c < asc.p8) bytes" || (echo "asc.p8 missing"; exit 1)
          [[ "$ASC_KEY_ID" =~ ^[A-Z0-9]{10}$ ]] || { echo "Bad ASC_KEY_ID (expect 10 uppercase letters/digits)"; exit 1; }
          [[ "$ASC_ISSUER_ID" =~ ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$ ]] || { echo "Bad ASC_ISSUER_ID (expect UUID)"; exit 1; }
          [[ "$APPLE_TEAM_ID" =~ ^[A-Z0-9]{10}$ ]] || { echo "Bad APPLE_TEAM_ID (expect 10 uppercase letters/digits)"; exit 1; }

      - name: Submit to TestFlight
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          EXPO_ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          EXPO_ASC_API_KEY_PATH: ${{ github.workspace }}/project-mobile/asc.p8
          EXPO_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          eas submit --platform ios \
            --path build.ipa \
            --profile preview \
            --non-interactive --verbose
