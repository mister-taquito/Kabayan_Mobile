name: ios-local-build
on:
  workflow_dispatch:

defaults:
  run:
    working-directory: project-mobile

jobs:
  build:
    runs-on: macos-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}   # <- auth for all eas commands
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install EAS CLI
        run: npm i -g eas-cli

      - name: Install deps
        run: npm ci

      # optional sanity check (keeps token secret; just prints the user)
      - name: Verify Expo auth
        run: eas whoami

      - name: EAS local build (iOS)
        run: eas build --platform ios --profile preview --local --non-interactive --output build.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: project-mobile/build.ipa

      - name: Write ASC API key to file
        shell: bash
        run: |
          echo "${{ secrets.ASC_API_KEY_P8_BASE64 }}" | base64 --decode > asc.p8
      - name: Submit to TestFlight
        run: |
          eas submit -p ios \
            --path build.ipa \
            --asc-app-id "${{ secrets.ASC_APP_ID }}" \
            --issuer-id "${{ secrets.ASC_ISSUER_ID }}" \
            --key-id "${{ secrets.ASC_KEY_ID }}" \
            --asc-api-key-path asc.p8 \
            --apple-team-id "${{ secrets.APPLE_TEAM_ID }}" \
            --non-interactive --verbose