name: ios-build-submit-legacy
on:
  workflow_dispatch:

# Run every shell step from the mobile app folder
defaults:
  run:
    working-directory: project-mobile

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18.18.2

      - name: Install EAS CLI
        run: npm i -g eas-cli

      - name: Install deps
        run: npm ci

      - name: Verify Expo auth
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas whoami

      - name: Build iOS on EAS cloud
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas build --platform ios --profile preview --non-interactive --wait

      - name: Write ASC API key to file
        shell: bash
        run: |
          echo "${{ secrets.ASC_API_KEY_P8_BASE64 }}" | base64 --decode > asc.p8

      - name: Submit to TestFlight
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          ASC_APP_ID: ${{ secrets.ASC_APP_ID }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          EXPO_ASC_API_KEY_PATH: ${{ github.workspace }}/project-mobile/asc.p8
        run: |
          eas submit -p ios \
            --latest \
            --profile preview \
            --non-interactive --verbose
